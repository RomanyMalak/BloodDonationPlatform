<main class="auth-page">
  <div class="container h-100">
    <div class="row h-100 align-items-center justify-content-center">
      <div class="col-lg-4 col-md-6 col-12">
        <div class="auth-card">

          <!-- Logo Icon -->
          <div class="text-center mb-4">
            <div class="auth-icon mx-auto mb-3">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            </div>
            <h2 class="mb-1">مرحباً بك في نبض الأمل</h2>
            <p class="text-secondary mb-0">سجل دخولك للمساهمة في إنقاذ الأرواح</p>
          </div>

          <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

            <!-- البريد أو الهاتف -->
            <div class="mb-3">
              <label class="form-label">البريد الإلكتروني أو رقم الهاتف</label>
              <div class="input-icon">
                <input type="text" class="form-control"
                  placeholder="example@mail.com"
                  [(ngModel)]="form.email"
                  name="email" required/>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
            </div>

            <!-- كلمة المرور -->
            <div class="mb-1">
              <label class="form-label">كلمة المرور</label>
              <div class="input-icon">
                <input [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  placeholder="••••••••"
                  [(ngModel)]="form.password"
                  name="password" required/>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <button type="button" class="password-toggle" (click)="showPassword = !showPassword">
                  <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                  <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- نسيت كلمة المرور -->
            <div class="mb-4">
              <a routerLink="/forgot-password" class="forgot-link">نسيت كلمة المرور؟</a>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-login w-100 mb-4" [disabled]="loginForm.invalid">
              تسجيل الدخول
            </button>

            <!-- Divider
            <div class="divider-text mb-4">
              <span>أو الدخول بواسطة</span>
            </div> -->

            <!-- Register Link -->
            <p class="text-center mb-0" style="font-size:0.875rem;">
              ليس لديك حساب؟
              <a routerLink="/register" class="register-link">سجل الآن</a>
            </p>

          </form>
        </div>
      </div>
    </div>
  </div>
</main>
