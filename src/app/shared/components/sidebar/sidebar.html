<aside class="sidebar">

  <!-- Brand -->
  <div class="sidebar__brand d-flex align-items-center gap-2">
    <div class="sidebar__brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
        <path d="M12 6a1 1 0 0 0-1 1v4.59l-2.7 2.7a1 1 0 1 0 1.41 1.41L12 13.41l2.29 2.29a1 1 0 0 0 1.41-1.41L13 11.59V7a1 1 0 0 0-1-1z"/>
      </svg>
    </div>
    <div>
      <div class="sidebar__brand-title">نظام الإدارة الذكي</div>
      <div class="sidebar__brand-sub">متصل بـ AI Pipeline</div>
    </div>
  </div>

  <!-- Nav Items -->
  <nav class="sidebar__nav">
    <ul class="d-flex flex-column gap-1 mb-0">

      <li>
        <a routerLink="/dashboard-User" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="sidebar__item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span>لوحة التحكم</span>
        </a>
      </li>

      <li>
        <a [routerLink]="['/dashboard-User']" [fragment]="'my-requests'" routerLinkActive="active" class="sidebar__item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          <span>طلباتي</span>
        </a>
      </li>

      <li>
        <a routerLink="/donation-requests" routerLinkActive="active" class="sidebar__item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span>جميع طلبات الدم</span>
        </a>
      </li>

      <li>
        <a href="javascript:void(0)" (click)="goToAiPipeline()" routerLinkActive="active" class="sidebar__item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          </svg>
          <span>تحليلات الذكاء الاصطناعي</span>
        </a>
      </li>


    </ul>
  </nav>

  <!-- Bottom Actions -->
  <div class="sidebar__bottom d-flex flex-column gap-2">
    <a routerLink="/request-form" class="btn btn-primary w-100 justify-content-center">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      طلب جديد
    </a>
    <button type="button" class="sidebar__logout d-flex align-items-center gap-2" (click)="logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      تسجيل الخروج
    </button>
  </div>

</aside>
