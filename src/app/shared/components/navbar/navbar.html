<nav class="navbar-custom" [class.scrolled]="isScrolled">
  <div class="container-fluid px-4">
    <div class="d-flex align-items-center justify-content-between">

      <!-- Logo -->
      <a class="navbar-logo" routerLink="/">وَريد</a>

      <!-- Links -->
      <ul class="navbar-links d-flex align-items-center gap-4 mb-0">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">الرئيسية</a></li>
        <li><a routerLink="/donation-requests" routerLinkActive="active">طلبات التبرع</a></li>
        <li><a routerLink="/Blood-Banks" routerLinkActive="active"> بنوك الدم</a></li>
        <li><a routerLink="/about" routerLinkActive="active">عن المنصة</a></li>
      </ul>

      <!-- Actions -->
      <div class="d-flex align-items-center gap-3">

    <!-- Notification Bell -->
<div class="navbar-notification" *ngIf="isLoggedIn()">
  <button class="notification-btn" (click)="toggleNotifications()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="notification-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </button>

  <!-- Dropdown -->
  <div class="notification-dropdown" *ngIf="showNotifications">
    <div class="notification-dropdown__header">
      <span>الإشعارات</span>
      <button class="btn-link" (click)="markAllRead()" *ngIf="unreadCount > 0">
        تعليم الكل كمقروء
      </button>
    </div>

    <div class="notification-dropdown__body">
      <div class="notification-item" *ngFor="let n of notifications"
           [class.notification-item--unread]="!n.isRead"
           (click)="markRead(n.id)">
        <div class="notification-item__title">{{ n.title }}</div>
        <div class="notification-item__msg">{{ n.message }}</div>
        <div class="notification-item__time">{{ n.createdAt | date:'dd/MM HH:mm' }}</div>
      </div>

      <div class="notification-item text-center text-secondary" *ngIf="notifications.length === 0">
        لا توجد إشعارات
      </div>
    </div>
  </div>
</div>

        <button class="icon-btn" aria-label="الإعدادات">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>

        <a *ngIf="isLoggedIn()" [routerLink]="getProfileRoute()" class="navbar-avatar">
          <img src="../../../../assets/images/user-image.jpg" alt="الملف الشخصي" />
        </a>

        <button *ngIf="isLoggedIn()" type="button" class="nav-logout-btn btn btn-outline btn-sm" (click)="logout()">
          تسجيل الخروج
        </button>

        <a *ngIf="!isLoggedIn()" routerLink="/login" class="nav-login-btn btn btn-primary btn-sm">
          <i class="bi bi-box-arrow-in-right"></i>
          تسجيل الدخول
        </a>

        <a routerLink="/request-form" class="btn btn-primary btn-sm">
          طلب تبرع عاجل
        </a>

      </div>
    </div>
  </div>
</nav>
